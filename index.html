<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказы Китай</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.top-bar {
    padding: 10px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #ddd;
}

input {
    padding: 5px;
    margin-right: 10px;
}

.table-container {
    overflow: auto;
    height: calc(100vh - 120px);
}

table {
    border-collapse: collapse;
    min-width: 1200px;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 5px;
    text-align: center;
}

td[contenteditable] {
    background: #fffef2;
}

td:not([contenteditable]):not(.photo-cell) {
    background: #f3f3f3;
    color: #555;
}

th {
    position: sticky;
    top: 0;
    background: #eee;
    z-index: 5;
}

.photo-cell {
    width: 100px;
    height: 120px;
    cursor: pointer;
}

.photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.tabs {
    display: flex;
    overflow-x: auto;
    background: white;
    border-top: 1px solid #ccc;
}

.tab {
    padding: 10px;
    border-right: 1px solid #ddd;
    cursor: pointer;
}

.tab.active {
    background: #ddd;
}

.tab.add {
    font-weight: bold;
}

.red {
    background: #ffcccc;
}
</style>
</head>

<body>

<div class="top-bar">
    Название: <input id="orderName">
Shipping (¥): <input id="shipping" type="number" oninput="recalc()">
Курс: <input id="rate" type="number" value="0.2" oninput="recalc()">
</div>

<div class="table-container">
<table id="table">
<thead>
<tr>
<th>№</th>
<th>Размер</th>
<th>Фото</th>
<th>Кол-во</th>
<th>Цена ¥</th>
<th>Сумма ¥</th>
<th>Дост ¥</th>
<th>Итого ¥</th>
<th>Shipping ¥</th>
<th>Итого+Ship</th>
<th>CAD</th>
<th>За шт CAD</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot id="tfoot"></tfoot>
</table>
</div>

<div style="padding: 10px; background: white; border-top: 1px solid #ddd;">
    <button onclick="addRow()">Добавить строку</button>
</div>
<div class="tabs" id="tabs"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCiVbCdacftqNjfJbiRr7DyXgGs4EQzi0M",
  authDomain: "china-orders-firebase.firebaseapp.com",
  projectId: "china-orders-firebase",
  storageBucket: "china-orders-firebase.firebasestorage.app",
  messagingSenderId: "395464576684",
  appId: "1:395464576684:web:930081fad3df6d1c369909",
  measurementId: "G-SVK0C8SZV7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();    
let orders = [];
let current = 0;
let currentRowCount = 20;
let currentOrderId = null;
let autoSaveTimeout;    
function createRows(rowCount = 20) {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    for (let i = 0; i < rowCount; i++) {
        let tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${i + 1}</td>
            <td contenteditable></td>
            <td class="photo-cell" onclick="uploadPhoto(this)"></td>
            <td contenteditable oninput="recalc()"></td>
            <td contenteditable oninput="recalc()"></td>
            <td></td>
            <td contenteditable oninput="recalc()"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        `;

        tbody.appendChild(tr);
    }
}

function uploadPhoto(cell) {
    const input = document.getElementById('fileInput');

    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = event => {
            const image = new Image();

            image.onload = () => {
                const canvas = document.createElement('canvas');

                const maxWidth = 300;
                const scale = maxWidth / image.width;

                canvas.width = maxWidth;
                canvas.height = image.height * scale;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

                const compressedImage = canvas.toDataURL('image/jpeg', 0.6);

                const img = document.createElement('img');
                img.src = compressedImage;

                cell.innerHTML = '';
                cell.appendChild(img);

                autoSaveOrder();
            };

            image.src = event.target.result;
        };

        reader.readAsDataURL(file);
    };

    input.click();
}
function recalc() {
    const rows = document.querySelectorAll('#tbody tr');
    let totalYuan = 0;

    rows.forEach(r => {
        let qty = parseFloat(r.children[3].innerText) || 0;
        let price = parseFloat(r.children[4].innerText) || 0;
        let delivery = parseFloat(r.children[6].innerText) || 0;

        let sum = qty * price;
        let total = sum + delivery;

        r.children[5].innerText = sum.toFixed(2);
        r.children[7].innerText = total.toFixed(2);

        totalYuan += total;
    });

    let shipping = parseFloat(document.getElementById('shipping').value) || 0;
    let rate = parseFloat(document.getElementById('rate').value) || 0;

    let coef = totalYuan ? shipping / totalYuan : 0;

    let totalShip = 0;
    let totalCAD = 0;

    rows.forEach(r => {
        let total = parseFloat(r.children[7].innerText) || 0;
        let qty = parseFloat(r.children[3].innerText) || 0;

        let ship = total * coef;
        let final = total + ship;
        let cad = final * rate;
        let per = qty ? cad / qty : 0;

        r.children[8].innerText = ship.toFixed(2);
        r.children[9].innerText = final.toFixed(2);
        r.children[10].innerText = cad.toFixed(2);
        r.children[11].innerText = per.toFixed(2);

        totalShip += ship;
        totalCAD += cad;
    });

    const tfoot = document.getElementById('tfoot');

tfoot.innerHTML = `
    <tr style="background:#ececec; font-weight:bold; border-top:2px solid #888;">
        <td colspan="5">ИТОГО</td>
        <td>${rows.length ? [...rows].reduce((sum, r) => sum + (parseFloat(r.children[5].innerText) || 0), 0).toFixed(2) : '0.00'}</td>
        <td>${rows.length ? [...rows].reduce((sum, r) => sum + (parseFloat(r.children[6].innerText) || 0), 0).toFixed(2) : '0.00'}</td>
        <td>${totalYuan.toFixed(2)}</td>
        <td class="${Math.abs(totalShip - shipping) > 1 ? 'red' : ''}">
            ${totalShip.toFixed(2)}
        </td>
        <td>${rows.length ? [...rows].reduce((sum, r) => sum + (parseFloat(r.children[9].innerText) || 0), 0).toFixed(2) : '0.00'}</td>
        <td>${totalCAD.toFixed(2)}</td>
        <td></td>
    </tr>
`;
    scheduleAutoSave();
}
function addRow() {
    const tbody = document.getElementById('tbody');
    currentRowCount++;

    let tr = document.createElement('tr');

    tr.innerHTML = `
        <td>${currentRowCount}</td>
        <td contenteditable></td>
        <td class="photo-cell" onclick="uploadPhoto(this)"></td>
        <td contenteditable oninput="recalc()"></td>
        <td contenteditable oninput="recalc()"></td>
        <td></td>
        <td contenteditable oninput="recalc()"></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    `;

    tbody.appendChild(tr);
    recalc();
    autoSaveOrder();
}
function renderTabs() {
    const tabs = document.getElementById('tabs');
    tabs.innerHTML = '';

    orders.forEach((o, i) => {
        let div = document.createElement('div');
        div.className = 'tab ' + (i === current ? 'active' : '');
        div.innerText = o.name || 'Без названия';
        div.onclick = () => switchTab(i);
        tabs.appendChild(div);
    });

    let add = document.createElement('div');
    add.className = 'tab add';
    add.innerText = '+';
    add.onclick = addTab;
    tabs.appendChild(add);
}

function addTab() {
    orders.push({
        name: '',
        firebaseId: null
    });

    current = orders.length - 1;
    currentOrderId = null;

    loadTab();
    autoSaveOrder();
}

function switchTab(i) {
    current = i;
    currentOrderId = orders[i].firebaseId || null;
    loadTab();
}
function loadTab() {
    currentRowCount = 20;
    document.getElementById('orderName').value = orders[current].name || '';
    createRows(currentRowCount);
    renderTabs();
    recalc();
}

document.getElementById('orderName').oninput = e => {
    orders[current].name = e.target.value;
    renderTabs();
    autoSaveOrder();
};
function scheduleAutoSave() {
    clearTimeout(autoSaveTimeout);

    autoSaveTimeout = setTimeout(() => {
        autoSaveOrder();
    }, 500);
}

async function autoSaveOrder() {
    const rows = document.querySelectorAll('#tbody tr');

    const items = [...rows].map(r => ({
        number: r.children[0].innerText,
        size: r.children[1].innerText,
        quantity: r.children[3].innerText,
        price: r.children[4].innerText,
        sum: r.children[5].innerText,
        chinaDelivery: r.children[6].innerText,
        totalYuan: r.children[7].innerText,
        shipping: r.children[8].innerText,
        finalYuan: r.children[9].innerText,
        cad: r.children[10].innerText,
        perItemCad: r.children[11].innerText,
        photo: r.children[2].querySelector('img')?.src || ''
    }));

    const orderData = {
        name: document.getElementById('orderName').value,
        shipping: document.getElementById('shipping').value,
        rate: document.getElementById('rate').value,
        rowCount: currentRowCount,
        updatedAt: new Date().toISOString(),
        items
    };

    try {
        if (!currentOrderId) {
            const docRef = await db.collection('orders').add(orderData);
            currentOrderId = docRef.id;
            orders[current].firebaseId = docRef.id;
        } else {
            await db.collection('orders').doc(currentOrderId).set(orderData);
        }

        console.log('Автосохранение выполнено');
    } catch (error) {
        console.error('Ошибка автосохранения', error);
    }
}    
addTab();
    
</script>

</body>
</html>
